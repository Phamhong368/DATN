name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tms_integration_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:backend

      - name: Run frontend component tests
        run: npm run test:frontend

      - name: Run backend API integration tests
        run: npm run test:integration
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: tms_integration_test
          JWT_SECRET: integration-test-secret

      - name: Run backend smoke check
        run: npm run smoke

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E browser tests
        run: npm run test:e2e

      - name: Build frontend
        run: npm run build
